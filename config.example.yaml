schema_version: 1
# These are container paths. MEDIA_ROOT from .env is mounted at /data.
paths:
  # Point the camera FTP task or manual copy workflow at this inbox.
  input: /data/PhotoInbox/sony-camera
  # Processed media is organized below this directory as YYYY/MM/DD.
  output: /data/Photos/01_memories/sony
  # Working, retained-original, and duplicate files stay outside Photos.
  staging: /data/PhotoInbox/.staging/sony-camera
  retention: /data/PhotoInbox/.retention/shotmark-originals
  duplicates: /data/PhotoInbox/.duplicates/sony-camera
automation:
  enabled: true
  recursive: false
  poll_seconds: 2.0
  stable_cycles: 3
  minimum_age_seconds: 4.0
organization:
  organize_regular_media: true
  sort_by_capture_date: true
  date_pattern: "%Y/%m/%d"
live_photo:
  enabled: true
  duration_seconds: 3.0
  height: 1080
  fps: 30
  crf: 18
  preset: veryfast
  video_threads: 2
  audio_bitrate: 192k
originals:
  action: archive
  retention_days: 30
hooks:
  after_publish: []
  timeout_seconds: 60
