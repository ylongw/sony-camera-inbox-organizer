services:
  sony-camera-inbox:
    image: "${IMAGE:-docker.io/ylongwang/sony-camera-inbox-organizer:latest}"
    container_name: sony-camera-inbox-organizer
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      CONFIG_PATH: /config/config.yaml
      STATE_PATH: /config/state.sqlite
    ports:
      - "${WEB_PORT:-18088}:8080"
    volumes:
      - "${CONFIG_DIR:-./runtime/config}:/config"
      - "${MEDIA_ROOT:-./runtime/data}:/data"
    security_opt:
      - no-new-privileges:true
